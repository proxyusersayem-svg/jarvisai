<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAISAR AI - Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h1>REGISTER</h1>
                <p>SYNTHESIZE NEW OPERATOR KEY</p>
            </div>
            <form id="signup-form" class="form-container">
                <div class="input-field">
                    <i class="fas fa-user"></i>
                    <input type="text" id="signup-name" placeholder="Full Display Name" required>
                </div>
                <div class="input-field">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="signup-email" placeholder="Email Address" required>
                </div>
                <div class="input-field">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="signup-password" placeholder="Create Security Password" required>
                </div>
                <button type="submit" class="submit-btn">REGISTER SECURE KEY</button>
            </form>
            <div class="auth-footer">
                <p>Already registered? <a href="login.html">Sign In</a></p>
            </div>
        </div>
    </div>
    <script src="firebase.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
